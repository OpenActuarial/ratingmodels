site_name: ratingmodels
site_description: Actuarial pricing and rate-indication tools for experience-rated insurance portfolios.
site_url: https://openactuarial.github.io/ratingmodels/
repo_url: https://github.com/OpenActuarial/ratingmodels
repo_name: OpenActuarial/ratingmodels

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true

nav:
  - Home: index.md
  - Theory: theory.md
  - API reference:
      - Credibility: api/credibility.md
      - Trend: api/trend.md
      - Build-up engine: api/buildup.md
      - Manual & experience: api/rates.md
      - Base rate & retention: api/base_loading.md
      - Indication & blending: api/indication.md
      - Decomposition: api/decomposition.md
      - Relativities (GLM): api/relativity.md
      - Constraints & renewal: api/renewal.md
  - Changelog: changelog.md
